spring.application.name=auth-service

# Server Port
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bulk_plain_tshirt_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Security Configuration
# Session timeout: 5 minutes = 300 seconds
server.servlet.session.timeout=5m
spring.session.timeout=300

# Encryption Key (Base64 encoded 256-bit key)
app.encryption.secret-key=U29tZVNlY3JldEtleUZvckVuY3J5cHRpb25BbmREZWNyeXB0aW9uS2V5MTIzNDU2Nzg5MA==

# JWT Secret
app.jwt.secret=9a67471ec97aa3aa1034e45d287d865bc9a6b47201e51246142646241b4b1a4a
app.jwt.expiration-ms=300000

# Lockout configuration
app.auth.max-failed-attempts=3
app.auth.lock-duration-ms=600000

# Captcha configuration (Placeholder)
app.captcha.secret=YOUR_CAPTCHA_SECRET

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
